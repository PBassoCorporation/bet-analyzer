<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Analyzer Bet Pro</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<h1>⚽ Analyzer Bet Pro</h1>

<div class="container">

  <input type="text" id="partida" placeholder="Ex: Flamengo x Palmeiras">

  <input type="number" id="atkHome" placeholder="Ataque Casa">
  <input type="number" id="defAway" placeholder="Defesa Visitante">
  <input type="number" id="atkAway" placeholder="Ataque Visitante">
  <input type="number" id="defHome" placeholder="Defesa Casa">
  <input type="number" id="odd" placeholder="Odd Over 2.5">

  <select id="resultadoAposta">
    <option value="">Resultado da aposta</option>
    <option value="win">✅ Green</option>
    <option value="loss">❌ Red</option>
  </select>

  <button onclick="calcular()">Analisar</button>

  <button onclick="limparCampos()" class="btn-limpar">
    Limpar
  </button>

  <button onclick="limparHistorico()" class="btn-historico">
    Limpar Histórico
  </button>

  <div id="resultado"></div>

</div>

<h2>📊 Histórico</h2>
<div id="historico"></div>

<h2>💰 Dashboard</h2>
<div id="dashboard"></div>

<script src="script.js"></script>

</body>
</html>
